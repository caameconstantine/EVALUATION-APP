<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <style>

    body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;direction:rtl}

<body>
  <div class="container">
    <div class="icon">📡</div>

    <p style="font-size:0.85rem;color:#999;margin-bottom:20px">البيانات المحلية متاحة للقراءة فقط</p>
    <a href="/EVALUATION-APP/" class="btn">🔄 إعادة المحاولة</a>

</html>
